<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">ChatGPT with Private Drop workflow</title>
  <desc id="desc">A large diagram showing ChatGPT working with Private Drop through compact Actions, goal approval, safe editing, checks, git, diagrams, reports, and deployment.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.45" stop-color="#111827"/>
      <stop offset="1" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="chat" x1="0" x2="1">
      <stop offset="0" stop-color="#10b981"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="server" x1="0" x2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="project" x1="0" x2="1">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#ec4899"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000" flood-opacity="0.28"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M1,1 L11,6 L1,11 Z" fill="#cbd5e1"/>
    </marker>
    <style>
      .title{font-family:Inter,Arial,sans-serif;font-size:46px;font-weight:800;fill:#f8fafc}.subtitle{font-family:Inter,Arial,sans-serif;font-size:20px;fill:#cbd5e1}.h{font-family:Inter,Arial,sans-serif;font-size:25px;font-weight:800;fill:#fff}.t{font-family:Inter,Arial,sans-serif;font-size:17px;fill:#e2e8f0}.small{font-family:Inter,Arial,sans-serif;font-size:14px;fill:#cbd5e1}.tiny{font-family:Inter,Arial,sans-serif;font-size:12px;fill:#94a3b8}.card{rx:26;filter:url(#shadow)}.pill{rx:18}.stroke{stroke:#334155;stroke-width:2}.arrow{stroke:#cbd5e1;stroke-width:4;fill:none;marker-end:url(#arrow)}.dash{stroke-dasharray:10 10}.code{font-family:JetBrains Mono,Consolas,monospace;font-size:14px;fill:#d1fae5}.muted{fill:#94a3b8}.white{fill:#fff}.green{fill:#10b981}.blue{fill:#60a5fa}.violet{fill:#a78bfa}.amber{fill:#f59e0b}.red{fill:#f87171}
    </style>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>
  <circle cx="1330" cy="170" r="260" fill="#2563eb" opacity="0.10"/>
  <circle cx="180" cy="840" r="300" fill="#10b981" opacity="0.08"/>
  <circle cx="820" cy="930" r="260" fill="#ec4899" opacity="0.08"/>

  <text x="70" y="82" class="title">ChatGPT × Private Drop</text>
  <text x="72" y="118" class="subtitle">A safer Codex-like loop: propose goal → user approves → edit/check/commit/report → deploy.</text>

  <!-- ChatGPT card -->
  <rect x="70" y="190" width="330" height="260" rx="28" fill="url(#chat)" class="card"/>
  <text x="110" y="245" class="h">ChatGPT</text>
  <text x="110" y="282" class="t">Natural language planner</text>
  <text x="110" y="315" class="t">Reads project context</text>
  <text x="110" y="348" class="t">Generates code & diagrams</text>
  <text x="110" y="381" class="t">Requests bounded permission</text>
  <rect x="110" y="405" width="236" height="32" rx="16" fill="#064e3b" opacity="0.9"/>
  <text x="128" y="426" class="code">compact GPT Actions</text>

  <!-- Approval card -->
  <rect x="70" y="540" width="330" height="250" rx="28" fill="#1f2937" stroke="#f59e0b" stroke-width="2" class="card"/>
  <text x="110" y="592" class="h">User approval</text>
  <text x="110" y="628" class="t">Goal starts as pending</text>
  <text x="110" y="660" class="t">User approves goal_id</text>
  <text x="110" y="692" class="t">Only then it becomes active</text>
  <text x="110" y="724" class="t">Closed goals deny auto-run</text>
  <rect x="110" y="748" width="230" height="32" rx="16" fill="#451a03" opacity="0.92"/>
  <text x="130" y="769" class="code">pending → active</text>

  <!-- Private Drop card -->
  <rect x="525" y="180" width="550" height="640" rx="32" fill="#111827" stroke="#334155" stroke-width="2" class="card"/>
  <text x="570" y="238" class="h">Private Drop v4</text>
  <text x="570" y="274" class="subtitle">Self-hosted controlled development bridge</text>

  <rect x="575" y="320" width="220" height="92" rx="22" fill="#0f766e" opacity="0.95"/>
  <text x="604" y="352" class="h" style="font-size:20px">Context batch</text>
  <text x="604" y="382" class="small">overview + status + files</text>

  <rect x="830" y="320" width="200" height="92" rx="22" fill="#1d4ed8" opacity="0.95"/>
  <text x="858" y="352" class="h" style="font-size:20px">Safe edit</text>
  <text x="858" y="382" class="small">text + binary artifacts</text>

  <rect x="575" y="445" width="220" height="92" rx="22" fill="#7c2d12" opacity="0.95"/>
  <text x="604" y="477" class="h" style="font-size:20px">Checks</text>
  <text x="604" y="507" class="small">fmt / test / build / e2e</text>

  <rect x="830" y="445" width="200" height="92" rx="22" fill="#6d28d9" opacity="0.95"/>
  <text x="858" y="477" class="h" style="font-size:20px">Git</text>
  <text x="858" y="507" class="small">status / diff / commit</text>

  <rect x="575" y="570" width="220" height="92" rx="22" fill="#be123c" opacity="0.95"/>
  <text x="604" y="602" class="h" style="font-size:20px">Goal commands</text>
  <text x="604" y="632" class="small">create_*_and_approve</text>

  <rect x="830" y="570" width="200" height="92" rx="22" fill="#0369a1" opacity="0.95"/>
  <text x="858" y="602" class="h" style="font-size:20px">Reports</text>
  <text x="858" y="632" class="small">audit trail + summary</text>

  <rect x="575" y="700" width="455" height="70" rx="24" fill="#020617" stroke="#475569" stroke-width="1.5"/>
  <text x="604" y="730" class="code">/codex-openapi-compact.json</text>
  <text x="604" y="756" class="tiny">7 actions: batch, edit, git, command, goal ops, checks, report</text>

  <!-- Project card -->
  <rect x="1190" y="190" width="340" height="600" rx="32" fill="url(#project)" class="card"/>
  <text x="1232" y="245" class="h">Project workspace</text>
  <text x="1232" y="282" class="t">private-drop-v4</text>
  <text x="1232" y="323" class="t">Source code</text>
  <text x="1232" y="356" class="t">README / docs</text>
  <text x="1232" y="389" class="t">Diagrams & artifacts</text>
  <text x="1232" y="422" class="t">Tests & scripts</text>
  <rect x="1230" y="462" width="250" height="42" rx="20" fill="#312e81" opacity="0.9"/>
  <text x="1254" y="489" class="code">SVG / Mermaid / HTML</text>
  <rect x="1230" y="522" width="250" height="42" rx="20" fill="#831843" opacity="0.9"/>
  <text x="1254" y="549" class="code">PNG / PDF via base64</text>
  <rect x="1230" y="582" width="250" height="42" rx="20" fill="#4c1d95" opacity="0.9"/>
  <text x="1254" y="609" class="code">Git commits</text>
  <rect x="1230" y="642" width="250" height="42" rx="20" fill="#164e63" opacity="0.9"/>
  <text x="1254" y="669" class="code">Deployable binary</text>

  <!-- Arrows -->
  <path d="M400 320 C455 320 470 320 525 320" class="arrow"/>
  <path d="M400 665 C460 665 475 615 575 615" class="arrow"/>
  <path d="M1075 365 C1125 365 1135 365 1190 365" class="arrow"/>
  <path d="M1075 620 C1125 620 1135 620 1190 620" class="arrow"/>
  <path d="M1360 790 C1360 900 270 900 270 790" class="arrow dash"/>

  <!-- Bottom pipeline -->
  <rect x="150" y="870" width="1300" height="80" rx="30" fill="#020617" stroke="#334155" stroke-width="2" opacity="0.95"/>
  <text x="205" y="920" class="code">observe → plan → edit → test → commit → report → deploy → learn</text>
  <circle cx="1180" cy="910" r="13" fill="#10b981"/>
  <circle cx="1220" cy="910" r="13" fill="#3b82f6"/>
  <circle cx="1260" cy="910" r="13" fill="#a78bfa"/>
  <circle cx="1300" cy="910" r="13" fill="#f59e0b"/>

  <!-- Labels -->
  <text x="430" y="294" class="small">Actions</text>
  <text x="438" y="645" class="small">approval boundary</text>
  <text x="1100" y="338" class="small">safe writes</text>
  <text x="1100" y="596" class="small">audit + git</text>
</svg>
