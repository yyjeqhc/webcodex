id = "webcodex"
path = "/root/git/webcodex"
name = "webcodex"
kind = "rust"
description = "WebCodex server and agent"
disabled = false

[hooks]
doctor = [
  "git status --short",
  "git log --oneline -5"
]

precommit = [
  ". /root/.cargo/env && cargo fmt --check",
  ". /root/.cargo/env && cargo test"
]
