<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <title>WebCodex — Project Readiness</title>
  <link rel="stylesheet" href="/console/styles.css" />
</head>
<body>
  <main id="page">
    <header class="topbar">
      <div>
        <h1>WebCodex</h1>
        <p class="muted">Project readiness</p>
      </div>
      <div class="topbar-controls" id="topbar-controls" hidden>
        <button id="refresh-btn" class="btn" type="button">Refresh</button>
        <label class="auto-toggle">
          <input id="auto-toggle" type="checkbox" checked />
          <span>Auto</span>
        </label>
        <span id="last-updated" class="muted small"></span>
      </div>
    </header>

    <section id="token-gate" class="gate">
      <form id="token-form" autocomplete="off">
        <h2>Connect to WebCodex</h2>
        <p class="muted">Enter the local access token. It is never displayed.</p>
        <div class="field-row">
          <input id="token-input" type="password" placeholder="Bearer token" autocomplete="current-password" spellcheck="false" />
          <button class="btn btn-primary" type="submit">Connect</button>
        </div>
        <p id="token-error" class="error-text" role="alert"></p>
      </form>
    </section>

    <section id="console" hidden>
      <section class="panel">
        <div class="readiness-grid">
          <div class="fact fact-project"><span>Project</span><strong id="project">—</strong></div>
          <div class="fact"><span>Connection</span><strong id="connection">—</strong></div>
          <div class="fact"><span>Local agent</span><strong id="agent">—</strong></div>
          <div class="fact"><span>Capabilities</span><strong id="capabilities">—</strong></div>
          <div class="fact"><span>Coding access</span><strong id="coding">—</strong></div>
        </div>
      </section>

      <section class="panel next-panel">
        <h2>Next</h2>
        <code id="next-action">webcodex doctor</code>
      </section>

      <section class="panel">
        <h2>Readiness checks</h2>
        <ul id="findings" class="findings"></ul>
      </section>

      <p id="error-banner" class="error-text panel" role="alert" hidden></p>
    </section>

    <footer class="footer muted small">
      For full diagnostics, run <code>webcodex doctor</code> in the project.
    </footer>
  </main>
  <script src="/console/app.js"></script>
</body>
</html>
